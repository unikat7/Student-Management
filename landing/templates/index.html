<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 60px;
            background: rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .login-btn {
            padding: 8px 20px;
            border-radius: 25px;
            background: white;
            color: #4e73df;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #f8f9fc;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content {
            max-width: 700px;
        }

        .hero h1 {
            font-size: 45px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .hero .cta-btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #4e73df;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .hero .cta-btn:hover {
            background: #f8f9fc;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .hero h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">Student Management System</div>
        <a href="{% url 'signin' %}" class="login-btn">SMS Login</a>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Student Management System</h1>
            <p>
                Manage students, attendance, results, and academic records efficiently.
                A simple and smart solution for modern educational institutions.
            </p>
            <a href="{% url 'signin' %}" class="cta-btn">Access SMS</a>
        </div>
    </section>

</body>
</html>
