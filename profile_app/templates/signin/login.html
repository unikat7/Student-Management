<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System | Login</title>
    <link rel="stylesheet" href="{% static 'css/signin/login.css' %}">
    <style>
        .alert {
            background-color: #ffe0e0;
            color: #c0392b;
            border: 1px solid #e74c3c;
            border-left: 4px solid #e74c3c;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="login-box">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {{ message.tags }}" id="alert-message">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- School Logo -->
            <div class="logo">
                <img src="{% static 'images/gplogo.png' %}" alt="School Logo">
            </div>

            <!-- School Name -->
            <div class="school-name">
                GP Koirala Memorial College
            </div>

            <h2>Login</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username"
                           placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password"
                           placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Login</button>

            </form>

            <p class="signup-link">
                Don't have an account?
                <a href="{% url 'choice' %}">Register</a>
            </p>

        </div>
    </div>

    <script>
        const alertMsg = document.getElementById("alert-message");
        if (alertMsg) {
            setTimeout(() => {
                alertMsg.style.opacity = "0";
                setTimeout(() => alertMsg.remove(), 500);
            }, 4500); // 4.5s wait + 0.5s fade = 5s total
        }
    </script>

</body>
</html>
